<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCS Platform eBook — PRECISE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B1F3A;
    --navy2:#12294A;
    --teal:#0EA5A5;
    --orange:#F2994A;
    --paper:#FBF8F3;
    --paper-edge:#EFE8DB;
    --text:#1E2A3A;
    --muted:#64748B;
    --invest:#1B7A6B;
    --line:#E4DFD3;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Sarabun',sans-serif;
    background:var(--navy);
    color:var(--text);
    overflow:hidden;
  }
  .app{ display:flex; height:100vh; width:100vw; }

  /* ---------------- SIDEBAR ---------------- */
  .sidebar{
    width:300px; min-width:300px;
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy2) 100%);
    color:#fff;
    display:flex; flex-direction:column;
    padding:28px 22px;
    overflow-y:auto;
  }
  .brand-dots{ display:flex; gap:8px; margin-bottom:14px; }
  .brand-dots span{ width:9px; height:9px; border-radius:50%; display:inline-block; }
  .brand-dots span:nth-child(1){background:#3B82C4;}
  .brand-dots span:nth-child(2){background:#2FA36B;}
  .brand-dots span:nth-child(3){background:#E8A33D;}
  .brand-eyebrow{ font-size:11px; letter-spacing:2px; color:#9FB3D1; margin-bottom:4px; }
  .brand-title{ font-family:'Noto Serif Thai',serif; font-size:22px; font-weight:700; color:#fff; margin:0 0 2px 0; }
  .brand-sub{ font-size:12.5px; color:var(--teal); margin-bottom:24px; }

  nav.toc{ flex:1; }
  .toc-chapter{ margin-bottom:6px; }
  .toc-chapter-label{
    display:flex; align-items:center; gap:10px;
    padding:9px 10px; border-radius:8px; cursor:pointer;
    font-size:13.5px; color:#CFE0F5;
    transition:background .15s ease, color .15s ease;
  }
  .toc-chapter-label:hover{ background:rgba(255,255,255,0.06); color:#fff; }
  .toc-chapter-label .num{
    font-family:'Noto Serif Thai',serif; font-weight:700; font-size:13px;
    width:20px; flex-shrink:0; color:#7C93B5;
  }
  .toc-chapter-label.active{ background:rgba(14,165,165,0.16); color:#fff; }
  .toc-chapter-label.active .num{ color:var(--teal); }
  .toc-sub{ padding-left:34px; display:none; }
  .toc-chapter.open .toc-sub{ display:block; }
  .toc-sub-item{
    padding:6px 8px; font-size:12px; color:#8FA5C4; cursor:pointer; border-radius:6px;
    line-height:1.4;
  }
  .toc-sub-item:hover{ color:#fff; background:rgba(255,255,255,0.05); }
  .toc-sub-item.active{ color:var(--teal); font-weight:600; }

  .sidebar-footer{ font-size:10.5px; color:#5A719A; padding-top:16px; border-top:1px solid rgba(255,255,255,0.08); margin-top:10px; }

  /* ---------------- BOOK / MAIN AREA ---------------- */
  .book{
    flex:1; position:relative;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.05), transparent 60%),
      var(--navy);
    padding:36px;
  }
  .page-wrap{
    position:relative;
    width:min(880px, 100%);
    height:100%;
    max-height:820px;
    perspective:2400px;
  }
  .page-shadow-stack{
    position:absolute; inset:6px -10px -10px 10px;
    background:#00040c;
    border-radius:6px;
    filter:blur(2px);
    opacity:.35;
  }
  .page{
    position:relative;
    height:100%;
    background:var(--paper);
    border-radius:6px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.55), 0 2px 0 rgba(255,255,255,0.4) inset;
    padding:56px 64px 40px 64px;
    overflow-y:auto;
    transform-origin:left center;
    transition:transform .38s cubic-bezier(.4,.1,.2,1), opacity .32s ease;
  }
  .page::-webkit-scrollbar{ width:8px; }
  .page::-webkit-scrollbar-thumb{ background:var(--paper-edge); border-radius:8px; }
  .page.leaving-next{ transform:rotateY(-14deg) translateX(-30px); opacity:0; }
  .page.leaving-prev{ transform:rotateY(14deg) translateX(30px); opacity:0; }
  .page.entering{ transform:rotateY(0deg) translateX(0); opacity:1; }

  .page-curl{
    position:absolute; right:0; top:0; bottom:0; width:26px;
    background:linear-gradient(90deg, transparent, rgba(0,0,0,0.05));
    pointer-events:none;
  }

  .kicker{ font-size:11.5px; letter-spacing:2px; font-weight:700; color:var(--teal); margin-bottom:10px; }
  h1.page-title{ font-family:'Noto Serif Thai',serif; font-size:30px; font-weight:700; color:var(--navy); margin:0 0 6px 0; line-height:1.25; }
  .page-lead{ font-size:14px; font-style:italic; color:var(--muted); margin-bottom:26px; }
  h2.sec{ font-family:'Noto Serif Thai',serif; font-size:20px; font-weight:600; color:var(--teal); margin:28px 0 10px 0; }
  h3.sub{ font-family:'Noto Serif Thai',serif; font-size:16.5px; font-weight:600; color:var(--orange); margin:20px 0 6px 0; }
  p{ font-size:14.5px; line-height:1.75; margin:0 0 12px 0; }
  ul.plain{ margin:0 0 14px 0; padding-left:22px; }
  ul.plain li{ font-size:14.5px; line-height:1.7; margin-bottom:6px; }
  .muted-italic{ color:var(--muted); font-style:italic; font-size:13px; margin-bottom:14px; }

  .card{
    background:#F3F1EA;
    border-radius:8px;
    padding:14px 18px;
    margin-bottom:14px;
  }
  .card-title{ font-weight:700; color:var(--navy); font-size:15px; margin-bottom:8px; }
  .card-line{ font-size:13.3px; line-height:1.65; margin-bottom:5px; }
  .card-line b{ color:var(--navy); }
  .card-line.invest b{ color:var(--invest); }
  .card-line.revenue b{ color:var(--orange); }

  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 20px 0; }
  .chip{ border:1px solid var(--teal); color:var(--navy); border-radius:16px; padding:5px 12px; font-size:11.5px; background:#EAF7F5; }
  .chip.orange{ border-color:var(--orange); background:#FCEEE1; }

  .cover-page{ display:flex; flex-direction:column; justify-content:center; height:100%; }
  .cover-page .brand-eyebrow{ color:var(--muted); }
  .cover-page h1{ font-family:'Noto Serif Thai',serif; font-size:44px; color:var(--navy); margin:6px 0 4px 0; }
  .cover-page .subtitle{ font-family:'Noto Serif Thai',serif; font-size:22px; color:var(--teal); font-weight:600; margin-bottom:22px; }
  .cover-rule{ width:120px; height:3px; background:var(--teal); margin-bottom:22px; }
  .cover-desc{ font-size:15px; line-height:1.8; max-width:520px; color:var(--text); margin-bottom:30px; }
  .cover-footer{ font-size:12.5px; color:var(--muted); font-style:italic; }

  .toc-page-list{ columns:1; }
  .toc-page-item{ display:flex; justify-content:space-between; align-items:baseline; padding:10px 0; border-bottom:1px dotted var(--line); cursor:pointer; }
  .toc-page-item:hover .toc-page-item-title{ color:var(--teal); }
  .toc-page-item-title{ font-size:15px; color:var(--navy); font-weight:600; transition:color .15s; }
  .toc-page-item-num{ font-size:12px; color:var(--muted); }

  /* nav buttons */
  .nav-btn{
    position:absolute; top:50%; transform:translateY(-50%);
    width:46px; height:46px; border-radius:50%;
    border:none; background:rgba(255,255,255,0.08); color:#fff;
    font-size:20px; cursor:pointer; z-index:5;
    display:flex; align-items:center; justify-content:center;
    transition:background .15s ease, opacity .15s ease;
  }
  .nav-btn:hover{ background:rgba(255,255,255,0.18); }
  .nav-btn:disabled{ opacity:0.25; cursor:default; }
  .nav-btn.prev{ left:-8px; }
  .nav-btn.next{ right:-8px; }
  .book{ position:relative; }

  .page-footer-bar{
    position:absolute; bottom:10px; left:0; right:0;
    display:flex; justify-content:center; align-items:center; gap:14px;
    font-size:11.5px; color:#8FA5C4;
  }

  @media (max-width: 860px){
    .sidebar{ width:76px; min-width:76px; padding:20px 8px; }
    .brand-title,.brand-sub,.brand-eyebrow,.toc-chapter-label span:not(.num),.sidebar-footer{ display:none; }
    .toc-sub{ display:none !important; }
    .page{ padding:38px 26px 30px 26px; }
    .nav-btn.prev{ left:4px; } .nav-btn.next{ right:4px; }
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand-dots"><span></span><span></span><span></span></div>
    <div class="brand-eyebrow">PRECISE</div>
    <div class="brand-title">TCS Platform</div>
    <div class="brand-sub">eBook · คู่มือทีมพัฒนา</div>
    <nav class="toc" id="toc"></nav>
    <div class="sidebar-footer">อ่านต่อได้ทุกที่ · คลิกหัวข้อเพื่อข้ามไปหน้านั้น</div>
  </aside>
  <main class="book">
    <button class="nav-btn prev" id="prevBtn" aria-label="ก่อนหน้า">‹</button>
    <div class="page-wrap">
      <div class="page-shadow-stack"></div>
      <div class="page" id="pageEl"></div>
    </div>
    <button class="nav-btn next" id="nextBtn" aria-label="ถัดไป">›</button>
    <div class="page-footer-bar"><span id="pageNumLabel"></span></div>
  </main>
</div>

<script>
/* ---------------- helper builders ---------------- */
function subsystem(name, fn, mission, invest, cust, rev){
  let html = `<div class="card"><div class="card-title">${name}</div>`;
  if(fn) html += `<div class="card-line"><b>Function —</b> ${fn}</div>`;
  if(mission) html += `<div class="card-line"><b>Mission —</b> ${mission}</div>`;
  if(invest) html += `<div class="card-line invest"><b>มุมนักลงทุน —</b> ${invest}</div>`;
  if(cust) html += `<div class="card-line invest"><b>มุมลูกค้า —</b> ${cust}</div>`;
  if(rev) html += `<div class="card-line revenue"><b>Revenue —</b> ${rev}</div>`;
  html += `</div>`;
  return html;
}
function chips(list, orange){
  return `<div class="chip-row">` + list.map(c=>`<span class="chip${orange?' orange':''}">${c}</span>`).join('') + `</div>`;
}

/* ---------------- PAGE DATA ---------------- */
const pages = [];

// 0. COVER
pages.push({

      <div class="brand-dots"><span></span><span></span><span></span></div>

      <div class="cover-footer">Reference Manual for Development Team · Internal Use</div>
    </div>`
});

// 1. TOC (built after pages array is finalized, placeholder for now)

// 2. Chapter 1 - Mission
pages.push({

    <h2 class="sec">1.2 Way — แนวทางการเปลี่ยนผ่าน</h2>
    <p><b>Transform จาก Industrial Capitalism → Platform Capitalization</b></p>
    <p>จากเดิมที่ขายสินค้าหรืออุปกรณ์เพียงครั้งเดียวแล้วจบความสัมพันธ์กับลูกค้า เปลี่ยนเป็นการสร้างแพลตฟอร์มดิจิทัลที่สร้างมูลค่าและรายได้ต่อเนื่องตลอดอายุการใช้งานของทรัพย์สิน</p>

  html:`

      <li>D) Commercial Process (Pre-Sale → Sale)</li>
      <li>E) Post-Sale Value & Recurring Revenue</li>

// 4. Chapter 3.1
pages.push({

    ${subsystem("Architecture Design","\"แตกเป็นชิ้นงาน\" จากโจทย์","แปลงความต้องการเป็นแผนที่ลงมือทำได้จริง","จุดขาย engineering fee/services",null,null)}
    ${subsystem("Simulation & Virtual Validation","\"ทดลองในคอมพิวเตอร์\"","พิสูจน์ความถูกต้องก่อนลงทุนจริง","ลด cost of failure ที่ต้องรับผิดชอบหลังส่งมอบ","ลดความเสี่ยง error หน้างานจริง",null)}
    ${subsystem("Integration","เชื่อมต่อระบบ 3 ฟังก์ชันด้านบนเข้าด้วยกันให้เป็นระบบนิเวศข้อมูลเดียว เพื่อให้ทุกทีม (ไฟฟ้า เครื่องกล ซอฟต์แวร์ การผลิต) มองเห็นข้อมูลชุดเดียวกัน ไม่ต้องแยกไฟล์ต่างคนต่างเก็บ","เชื่อมโยงระบบเข้าด้วยกันให้เป็นระบบนิเวศข้อมูลเดียวที่ตรวจสอบย้อนกลับได้ เพื่อให้เกิดความร่วมมือข้ามสาขาวิชา การบริหารการเปลี่ยนแปลงที่แข็งแรง และการควบคุมการตั้งค่าตลอดวงจรการพัฒนาผลิตภัณฑ์ทั้งหมด","ต้นทุนงานถัดไปถูกลงเพราะมี \"คลังสูตร\" สะสม","งานเร็วขึ้นเพราะไม่ต้องเริ่มออกแบบใหม่ทุกครั้ง",null)}

/* ---------------- Build TOC page content now that pages[] exists ---------------- */
const tocPageIndex = pages.findIndex(p=>p.isToc);
pages[tocPageIndex].html = `
  <div class="kicker">สารบัญ</div>
  <h1 class="page-title">สารบัญ</h1>
  <div class="toc-page-list">
    ${pages.filter(p=>!p.tocSkip).map((p,i)=>{
      const realIndex = pages.indexOf(p);
      return `<div class="toc-page-item" data-goto="${realIndex}">
        <span class="toc-page-item-title">${p.nav || p.title}</span>
        <span class="toc-page-item-num">หน้า ${realIndex+1}</span>
      </div>`;
    }).join('')}
  </div>
`;

/* ---------------- Sidebar TOC (grouped by chapter) ---------------- */
const tocEl = document.getElementById('toc');
const grouped = {};
const order = [];
pages.forEach((p, idx)=>{
  if(p.tocSkip) return;
  const key = p.parentLabel || p.nav || p.title;
  const chapNum = p.chapter;
  const groupKey = p.parentLabel ? p.parentLabel : (chapNum + '|' + (p.nav||p.title));
  if(!grouped[groupKey]){ grouped[groupKey] = { label: p.parentLabel || p.nav || p.title, chapter: chapNum, items: [] }; order.push(groupKey); }
  grouped[groupKey].items.push({ idx, label: p.nav || p.title });
});

order.forEach(key=>{
  const g = grouped[key];
  const wrap = document.createElement('div');
  wrap.className = 'toc-chapter';
  const isGroup = g.items.length > 1;
  const labelDiv = document.createElement('div');
  labelDiv.className = 'toc-chapter-label';
  labelDiv.innerHTML = `<span class="num">${g.chapter}</span><span>${g.label}</span>`;
  labelDiv.addEventListener('click', ()=>{
    if(isGroup){ wrap.classList.toggle('open'); }
    else { goTo(g.items[0].idx); }
  });
  wrap.appendChild(labelDiv);
  if(isGroup){
    const sub = document.createElement('div');
    sub.className = 'toc-sub';
    g.items.forEach(it=>{
      const s = document.createElement('div');
      s.className = 'toc-sub-item';
      s.textContent = it.label;
      s.dataset.idx = it.idx;
      s.addEventListener('click', (e)=>{ e.stopPropagation(); goTo(it.idx); });
      sub.appendChild(s);
    });
    wrap.appendChild(sub);
  }
  tocEl.appendChild(wrap);
});
// TOC page + Cover manual entries at top
const coverEntry = document.createElement('div');
coverEntry.className = 'toc-chapter';
coverEntry.innerHTML = `<div class="toc-chapter-label" data-idx="0"><span class="num">·</span><span>หน้าปก</span></div>`;
coverEntry.querySelector('.toc-chapter-label').addEventListener('click', ()=>goTo(0));
tocEl.insertBefore(coverEntry, tocEl.firstChild);

const tocEntry = document.createElement('div');
tocEntry.className = 'toc-chapter';
tocEntry.innerHTML = `<div class="toc-chapter-label" data-idx="${tocPageIndex}"><span class="num">·</span><span>สารบัญ</span></div>`;
tocEntry.querySelector('.toc-chapter-label').addEventListener('click', ()=>goTo(tocPageIndex));
tocEl.insertBefore(tocEntry, tocEl.children[1]);

/* ---------------- Rendering & Navigation ---------------- */
let current = 0;
const pageEl = document.getElementById('pageEl');
const pageNumLabel = document.getElementById('pageNumLabel');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function render(dir){
  const p = pages[current];
  pageEl.innerHTML = p.html;
  pageEl.scrollTop = 0;
  pageNumLabel.textContent = `หน้า ${current+1} / ${pages.length}`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === pages.length - 1;

  // sidebar active states
  document.querySelectorAll('.toc-chapter-label').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.toc-sub-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll(`[data-idx="${current}"]`).forEach(el=>el.classList.add('active'));
  document.querySelectorAll(`.toc-sub-item[data-idx="${current}"]`).forEach(el=>{
    el.classList.add('active');
    el.closest('.toc-chapter').classList.add('open');
  });

  if(dir){
    pageEl.classList.add(dir === 'next' ? 'leaving-prev' : 'leaving-next');
    requestAnimationFrame(()=>{
      pageEl.classList.remove('leaving-prev','leaving-next');
      pageEl.classList.add('entering');
      setTimeout(()=>pageEl.classList.remove('entering'), 400);
    });
  }
}
function goTo(idx){
  if(idx === current || idx < 0 || idx >= pages.length) return;
  const dir = idx > current ? 'next' : 'prev';
  current = idx;
  render(dir);
}
prevBtn.addEventListener('click', ()=>goTo(current-1));
nextBtn.addEventListener('click', ()=>goTo(current+1));
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight') goTo(current+1);
  if(e.key === 'ArrowLeft') goTo(current-1);
});
pageEl.addEventListener('click', (e)=>{
  const item = e.target.closest('.toc-page-item');
  if(item) goTo(parseInt(item.dataset.goto,10));
});

render();
</script>
